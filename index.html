<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#261b38">
  <title>魔女の館のモフモフパズル</title>
  <style>
    :root{--ink:#2d2034;--plum:#4f315f;--deep:#271b38;--paper:#fff8e9;--gold:#e9c26b;--pink:#e39aae;--mint:#9dcfb7;--line:#d9bf9c}
    *{box-sizing:border-box} body{margin:0;color:var(--ink);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;background:radial-gradient(circle at top,#76527a 0,#30213f 48%,#1c1827 100%);min-height:100vh}
    button{font:inherit;touch-action:manipulation;-webkit-tap-highlight-color:transparent} .app{max-width:560px;margin:auto;min-height:100vh;padding:env(safe-area-inset-top) 14px calc(22px + env(safe-area-inset-bottom));overflow:hidden}
    .screen{display:none;min-height:calc(100vh - env(safe-area-inset-top) - 22px)}.screen.active{display:flex;flex-direction:column}.ornament{color:var(--gold);letter-spacing:.25em;text-align:center;font-size:12px;margin:17px 0 5px}.title{font-family:serif;text-align:center;color:#fff6df;text-shadow:0 2px 0 #392142,0 0 20px #f6d898;font-size:clamp(27px,7vw,40px);margin:0}.subtitle{text-align:center;color:#e7cde5;font-size:12px;margin:7px 0 22px;letter-spacing:.12em}
    .paper{background:linear-gradient(135deg,#fffaf0,#f5e9d1);border:2px solid var(--gold);border-radius:18px;box-shadow:0 8px 20px #0d081a66, inset 0 0 0 4px #fff8e988;padding:16px}.home-hero{position:relative;text-align:center;padding:20px 15px 17px}.home-hero:before{content:"✦";position:absolute;left:24px;top:13px;color:var(--gold);font-size:25px}.home-hero:after{content:"☾";position:absolute;right:24px;bottom:10px;color:#b68bd1;font-size:30px}.home-copy{font-size:13px;line-height:1.8;margin:0 auto 14px;max-width:350px}.selected-box{display:flex;align-items:center;gap:10px;text-align:left;background:#ffffff88;border:1px dashed #c7a873;border-radius:14px;padding:10px}.char-face{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;font-size:31px;flex:none;background:#fff;box-shadow:0 2px 5px #92744555}.char-name{font-family:serif;font-weight:bold;font-size:18px}.char-desc{font-size:11px;color:#6f5a61;margin-top:2px}
    .primary,.secondary,.tiny{border:0;border-radius:999px;font-weight:bold;cursor:pointer}.primary{background:linear-gradient(#bb6d94,#84436d);color:#fff9ec;box-shadow:0 4px 0 #592945;padding:14px 20px;font-size:17px}.primary:active{transform:translateY(3px);box-shadow:0 1px 0 #592945}.secondary{background:#fff8e8;color:#55324f;border:2px solid #c99d63;padding:10px 14px}.tiny{background:#ead7b5;color:#533849;border:1px solid #c9a56d;padding:6px 9px;font-size:12px}.home-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:15px 0}.home-actions .primary{grid-column:span 2}.section-title{font-family:serif;font-size:20px;color:#f9e8bf;text-shadow:0 1px #392142;margin:18px 2px 9px}.companions{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.companion{padding:9px 4px 8px;border:2px solid transparent;border-radius:15px;background:#fdf4e3;cursor:pointer;color:var(--ink)}.companion.selected{border-color:#cf7396;background:#fffdf6;box-shadow:0 0 0 2px #f6d29a}.companion .face{display:block;font-size:34px;line-height:1.15}.companion b{font-family:serif;font-size:15px}.companion small{display:block;font-size:10px;color:#715b62;margin-top:2px}
    .save-note{text-align:center;color:#dcc7dc;font-size:11px;margin:12px 0 0}.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 0 8px;color:#fff5dd}.topbar button{color:#fff5dd;background:#ffffff1c;border:1px solid #f6d89666;border-radius:99px;padding:7px 11px}.stage-name{font-family:serif;font-size:19px}.stage-sub{font-size:10px;color:#dac3dc;text-align:center}.status{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;background:#fff7e7;border:2px solid var(--gold);border-radius:15px;padding:8px 10px;margin-bottom:10px}.mission{font-size:12px;line-height:1.65}.moves{text-align:center;background:var(--deep);color:#fff7e9;border-radius:11px;padding:6px 9px;min-width:64px}.moves b{display:block;font-family:serif;font-size:23px;line-height:1}.moves span{font-size:10px;color:#e7c7ab}
    .dialogue{min-height:58px;background:linear-gradient(135deg,#fffdf8,#efe2d2);border:2px solid #d4b478;border-radius:15px;padding:8px 11px;display:flex;gap:9px;align-items:center;margin-top:11px;box-shadow:0 4px 12px #160b2550}.dialogue .char-face{width:39px;height:39px;font-size:25px}.dialogue b{display:block;font-family:serif;font-size:14px;color:#6b3856}.dialogue p{font-size:12px;line-height:1.45;margin:2px 0 0}.board-wrap{background:linear-gradient(135deg,#61436c,#342642);border:3px solid #e2bf74;border-radius:19px;padding:8px;box-shadow:0 8px 18px #0d07168c}.board{display:grid;grid-template-columns:repeat(8,1fr);gap:3px}.tile{aspect-ratio:1;border:0;border-radius:15px;display:grid;place-items:center;font-size:clamp(22px,8.5vw,39px);cursor:pointer;position:relative;box-shadow:inset 0 -3px #00000022,0 1px 2px #00000066;background:#fff;transition:transform .12s,filter .12s}.tile:active{transform:scale(.91)}.tile.selected{outline:3px solid #fff0a9;outline-offset:1px;transform:scale(1.06);z-index:2}.tile.bear{background:linear-gradient(135deg,#fdfefe,#c9e7e7)}.tile.wolf{background:linear-gradient(135deg,#fff2a0,#e6a842)}.tile.panther{background:linear-gradient(135deg,#67728e,#252535)}.tile.moon{background:linear-gradient(135deg,#b8f0ff,#6086d2)}.tile.star{background:linear-gradient(135deg,#f5bcff,#b266bd)}.tile.burstH:after,.tile.burstV:after{content:"✦";font-size:20px;position:absolute;right:1px;bottom:0;color:#fff}.tile.cauldron:after{content:"✧";font-size:23px;position:absolute;right:1px;bottom:0;color:#fff8a8}.tile.clearing{animation:pop .2s ease both}@keyframes pop{to{transform:scale(.25);opacity:0}}
    .book{background:#f8efd9;border:5px solid #5b3945;box-shadow:inset 0 0 0 2px #d9ba75,0 7px 18px #0e071466;border-radius:8px 17px 17px 8px;min-height:420px;padding:17px}.book h2{font-family:serif;color:#5b3447;margin:0;text-align:center;font-size:24px}.book-intro{text-align:center;font-size:11px;color:#765d62;margin:4px 0 14px}.tabs{display:flex;border-bottom:2px solid #d5b77e;margin-bottom:13px}.tab{flex:1;border:0;background:transparent;color:#6a4557;padding:8px;font-weight:bold}.tab.active{background:#e8d6a5;border-radius:10px 10px 0 0}.book-page{display:none}.book-page.active{display:block}.collection{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.collect{min-height:113px;background:#fffaf0;border:1px solid #d9bf8e;border-radius:11px;padding:9px;position:relative}.collect.locked{filter:grayscale(1);opacity:.55}.collect .item-icon{font-size:33px;float:left;margin:0 7px 3px 0}.collect b{font-family:serif;font-size:15px}.collect p{font-size:10px;line-height:1.45;margin:5px 0}.collect small{display:block;font-size:10px;color:#9b6f64}.achievements{display:grid;gap:7px}.achievement{display:flex;align-items:center;gap:9px;background:#fffaf0;border:1px solid #d7be8c;border-radius:10px;padding:7px}.achievement.locked{filter:grayscale(1);opacity:.52}.ach-icon{font-size:27px;width:33px;text-align:center}.achievement b{font-family:serif;font-size:14px}.achievement p{font-size:10px;margin:2px 0 0;color:#725f5e}.modal{position:fixed;inset:0;z-index:10;background:#100819a8;display:none;place-items:center;padding:20px}.modal.open{display:grid}.modal-card{width:min(440px,100%);max-height:85vh;overflow:auto;background:#fff7e7;border:3px solid #e4bf72;border-radius:20px;padding:20px;box-shadow:0 8px 30px #09040d}.modal-card h2{font-family:serif;color:#5c324c;text-align:center;margin:0 0 8px}.modal-card p{font-size:13px;line-height:1.7}.reward{font-family:serif;background:#f5dfae;border-radius:13px;padding:11px;text-align:center;font-size:17px}.modal-actions{display:flex;gap:9px;justify-content:center;margin-top:14px;flex-wrap:wrap}.field-label{font-weight:bold;font-size:13px;display:block;margin:11px 0 5px}.data-box{width:100%;min-height:86px;border:1px solid #c7a468;border-radius:9px;padding:8px;font-size:11px;background:#fffdf7;resize:vertical}.notice{font-size:11px;color:#765b5e}.toast{position:fixed;z-index:30;left:50%;bottom:calc(20px + env(safe-area-inset-bottom));transform:translate(-50%,130%);transition:.24s;background:#2c1c36;color:#fff8e6;border:1px solid #e6c57d;padding:10px 15px;border-radius:99px;font-size:12px;box-shadow:0 4px 12px #0008}.toast.show{transform:translate(-50%,0)}
    @media(min-width:540px){.app{padding-left:22px;padding-right:22px}.tile{border-radius:18px}}
  </style>
</head>
<body>
<main class="app">
  <section id="homeScreen" class="screen active">
    <div class="ornament">✦ ─── ☾ ─── ✦</div><h1 class="title">魔女の館の<br>モフモフパズル</h1><p class="subtitle">― 森の館で、獣人たちと魔法のひととき ―</p>
    <div class="paper home-hero"><p class="home-copy">三人の獣人とともに、魔法のピースをそろえよう。<br>館で見つけた品々は、あなたの手帳に記されていく。</p><div id="homeSelected" class="selected-box"></div></div>
    <div class="home-actions"><button id="startBtn" class="primary">パズルをはじめる</button><button id="bookBtn" class="secondary">✦ 魔女の手帳</button><button id="settingsBtn" class="secondary">⚙ セーブデータ</button></div>
    <h2 class="section-title">一緒に遊ぶ相手</h2><div id="companions" class="companions"></div><p class="save-note">進行状況はこの端末に自動保存されます。</p>
  </section>
  <section id="playScreen" class="screen">
    <div class="topbar"><button id="backHomeBtn">〈 館へ戻る</button><div><div id="stageName" class="stage-name">STAGE 1</div><div id="stageSub" class="stage-sub"></div></div><button id="restartBtn">↻ やり直す</button></div>
    <div class="status"><div id="mission" class="mission"></div><div class="moves"><b id="moves">20</b><span>のこり手数</span></div></div>
    <div class="board-wrap"><div id="board" class="board" aria-label="パズル盤面"></div></div><div id="dialogue" class="dialogue"></div>
  </section>
  <section id="bookScreen" class="screen"><div class="topbar"><button class="backHome">〈 館へ戻る</button><div class="stage-name">魔女の手帳</div><span></span></div><div class="book"><h2>魔女の手帳</h2><p class="book-intro">館で紡いだ、小さな記録。</p><div class="tabs"><button class="tab active" data-tab="items">収集品</button><button class="tab" data-tab="achievements">実績</button></div><div id="itemsPage" class="book-page active"></div><div id="achievementsPage" class="book-page"></div></div></section>
</main>
<div id="resultModal" class="modal"><div class="modal-card" id="resultCard"></div></div>
<div id="settingsModal" class="modal"><div class="modal-card"><h2>セーブデータの移行</h2><p>機種変更などのときは、文字列を書き出して保管できます。読み込みを行うと、現在のデータは上書きされます。</p><label class="field-label" for="saveText">セーブデータ</label><textarea id="saveText" class="data-box" placeholder="ここに読み込み用の文字列を貼り付けます"></textarea><div class="modal-actions"><button id="exportBtn" class="secondary">書き出す</button><button id="importBtn" class="primary">読み込む</button></div><p class="notice">※大切なデータは、書き出した文字列をメモなどに保管してね。</p><div class="modal-actions"><button id="resetBtn" class="tiny">すべてのデータを初期化</button><button class="tiny closeModal">閉じる</button></div></div></div>
<div id="toast" class="toast"></div>
<script>
(() => {
  const KEY='mofupuzz-save-v1';
  const TYPES={bear:{icon:'🐻‍❄️',name:'白熊'},wolf:{icon:'🐺',name:'金狼'},panther:{icon:'🐈‍⬛',name:'黒豹'},moon:{icon:'🌙',name:'月の魔法石'},star:{icon:'⭐',name:'星の魔法石'}};
  const CHARACTERS={balto:{name:'バルト',face:'🐻‍❄️',desc:'寡黙な白熊の守護者',lines:{start:'……盤面をよく見ろ。焦らなくていい。',match:'悪くない。お前らしい魔法だ。',special:'……見事だ。俺まで少し、熱くなる。',clear:'よくやった。温かい茶を淹れておく。',fail:'大丈夫だ。もう一度、俺とやろう。'}},philo:{name:'フィロ',face:'🐺',desc:'笑顔の奥に本心を隠す金狼',lines:{start:'今日はどんな魔法を見せてくれるのかな？',match:'ふふ、今の連鎖、きれいだったよ。',special:'おや、すごい。君のこと、もっと見たくなるね。',clear:'おつかれさま、魔女さん。ご褒美もあるみたい。',fail:'惜しかったね。でも、君となら何度でも遊びたいな。'}},judah:{name:'ジュダ',face:'🐈‍⬛',desc:'情熱的で世話焼きな黒豹',lines:{start:'よし、俺がそばにいる。派手にいこうぜ！',match:'いいぞ！ そのまま畳みかけろ！',special:'うおっ、今の見たか!? 最高じゃねぇか！',clear:'やったな！ ほら、ちゃんと誇っていいぞ。',fail:'まだ終わりじゃねぇ。次は絶対、決めようぜ。'}}};
  const STAGES=[
    {moves:20,goal:{bear:10},note:'まずは白熊のピースを集めよう'},
    {moves:20,goal:{wolf:12},note:'金狼のピースを集めよう'},
    {moves:20,goal:{panther:14},note:'黒豹のピースを集めよう'},
    {moves:22,goal:{moon:12,star:12},note:'ふたつの魔法石を集めよう'},
    {moves:22,goal:{bear:13,wolf:13},note:'白熊と金狼をそろえよう'},
    {moves:23,goal:{panther:16,moon:14},note:'黒豹と月の魔法石を集めよう'},
    {moves:24,goal:{bear:19,star:16},note:'白熊と星の魔法石を集めよう'},
    {moves:24,goal:{wolf:20,panther:18},note:'金狼と黒豹をそろえよう'},
    {moves:25,goal:{moon:22,star:22},note:'月と星の魔法を重ねよう'},
    {moves:28,goal:{bear:16,wolf:16,panther:16},note:'三人の獣人の力を集めよう'}
  ];
  const ITEMS=[
    {stage:1,icon:'🫖',name:'白花のハーブティー',text:'バルトが温室で摘んだ、身体を温める香り高い茶葉。'},
    {stage:2,icon:'🍪',name:'月桂蜜のクッキー',text:'フィロが見つけてきた、ほのかに甘い焼き菓子。'},
    {stage:4,icon:'🧣',name:'雪白のマフラー',text:'北方の織り糸で作られた、なめらかな白い贈り物。'},
    {stage:6,icon:'🫙',name:'深紅のベリージャム',text:'ジュダが森で採った実を、丁寧に煮詰めたもの。'},
    {stage:8,icon:'✨',name:'星屑の小瓶',text:'夜の庭に舞う光を、そっと閉じ込めた小瓶。'},
    {stage:10,icon:'📖',name:'古い魔導書',text:'あなたの魔法の系譜を記した、館に伝わる一冊。'}
  ];
  const ACH=[
    {id:'first',icon:'✦',name:'はじめての魔法',text:'はじめてステージをクリアする',ok:s=>s.completed>=1},
    {id:'stage5',icon:'Ⅴ',name:'館に慣れてきた頃',text:'STAGE 5 に到達する',ok:s=>s.unlocked>=5},
    {id:'stage10',icon:'Ⅹ',name:'魔女の館の常連',text:'STAGE 10 に到達する',ok:s=>s.unlocked>=10},
    {id:'items',icon:'🎁',name:'小さな収集家',text:'収集品を6個そろえる',ok:s=>s.items.length>=6},
    {id:'bear',icon:'🐻‍❄️',name:'白銀の足跡',text:'白熊を100個消す',ok:s=>s.counts.bear>=100},
    {id:'wolf',icon:'🐺',name:'金色の足跡',text:'金狼を100個消す',ok:s=>s.counts.wolf>=100},
    {id:'panther',icon:'🐈‍⬛',name:'漆黒の足跡',text:'黒豹を100個消す',ok:s=>s.counts.panther>=100},
    {id:'balto',icon:'❄️',name:'白熊と歩く道',text:'バルトと10ステージクリアする',ok:s=>s.companionClears.balto>=10},
    {id:'philo',icon:'🍃',name:'金狼と歩く道',text:'フィロと10ステージクリアする',ok:s=>s.companionClears.philo>=10},
    {id:'judah',icon:'🔥',name:'黒豹と歩く道',text:'ジュダと10ステージクリアする',ok:s=>s.companionClears.judah>=10}
  ];
  const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
  const fresh=()=>({current:1,unlocked:1,completed:0,selected:'balto',items:[],counts:{bear:0,wolf:0,panther:0,wolf:0,moon:0,star:0},companionClears:{balto:0,philo:0,judah:0}});
  let save=load(), board=[], selected=null, moves=0, progress={}, busy=false, lastStageCompleted=0;
  function load(){try{let s=JSON.parse(localStorage.getItem(KEY));return {...fresh(),...s,counts:{...fresh().counts,...s.counts},companionClears:{...fresh().companionClears,...s.companionClears}}}catch{return fresh()}}
  function persist(){localStorage.setItem(KEY,JSON.stringify(save));}
  function show(id){$$('.screen').forEach(x=>x.classList.remove('active'));$('#'+id).classList.add('active');window.scrollTo(0,0)}
  function toast(t){const e=$('#toast');e.textContent=t;e.classList.add('show');clearTimeout(toast.timer);toast.timer=setTimeout(()=>e.classList.remove('show'),2200)}
  function companion(){return CHARACTERS[save.selected]}
  function renderHome(){let c=companion();$('#homeSelected').innerHTML=`<div class="char-face">${c.face}</div><div><div class="char-name">${c.name}とプレイ中</div><div class="char-desc">${c.desc}</div></div>`;$('#companions').innerHTML=Object.entries(CHARACTERS).map(([id,x])=>`<button class="companion ${id===save.selected?'selected':''}" data-char="${id}"><span class="face">${x.face}</span><b>${x.name}</b><small>${x.desc}</small></button>`).join('');$$('[data-char]').forEach(b=>b.onclick=()=>{save.selected=b.dataset.char;persist();renderHome();toast(`${CHARACTERS[save.selected].name}と一緒に遊ぶよ`)});}
  function type(){return Object.keys(TYPES)[Math.floor(Math.random()*5)]} function normal(t){return !['burstH','burstV','cauldron'].includes(t.special)}
  function tile(t=type()){return {type:t}}; function valid(r,c){return r>=0&&r<8&&c>=0&&c<8}
  function initialBoard(){do{board=Array.from({length:8},()=>Array.from({length:8},()=>tile()));}while(getMatches().cells.size||!hasMove());}
  function getMatches(){let cells=new Set(),runs=[];for(let r=0;r<8;r++){let c=0;while(c<8){let t=board[r][c]?.type,start=c;while(c<8&&board[r][c]?.type===t)c++;if(c-start>=3&&t){let a=[];for(let x=start;x<c;x++){cells.add(`${r},${x}`);a.push([r,x])}runs.push({dir:'h',cells:a})}}}for(let c=0;c<8;c++){let r=0;while(r<8){let t=board[r][c]?.type,start=r;while(r<8&&board[r][c]?.type===t)r++;if(r-start>=3&&t){let a=[];for(let x=start;x<r;x++){cells.add(`${x},${c}`);a.push([x,c])}runs.push({dir:'v',cells:a})}}}return {cells,runs}}
  function hasMove(){for(let r=0;r<8;r++)for(let c=0;c<8;c++)for(const[dR,dC]of [[1,0],[0,1]]){let R=r+dR,C=c+dC;if(!valid(R,C))continue;[board[r][c],board[R][C]]=[board[R][C],board[r][c]];let yes=getMatches().cells.size>0;[board[r][c],board[R][C]]=[board[R][C],board[r][c]];if(yes)return true}return false}
  function renderBoard(){let html='';for(let r=0;r<8;r++)for(let c=0;c<8;c++){let x=board[r][c],cl=x.type;if(x.special)cl+=' '+x.special;html+=`<button class="tile ${cl} ${selected&&selected[0]===r&&selected[1]===c?'selected':''}" data-r="${r}" data-c="${c}" aria-label="${TYPES[x.type].name}">${TYPES[x.type].icon}</button>`}$('#board').innerHTML=html;$$('.tile').forEach(b=>b.onclick=()=>tap(+b.dataset.r,+b.dataset.c));}
  function stage(){return STAGES[save.current-1]} function renderStatus(){let s=stage();$('#stageName').textContent=`STAGE ${save.current}`;$('#stageSub').textContent=s.note;$('#moves').textContent=moves;$('#mission').innerHTML='<b>目標</b><br>'+Object.entries(s.goal).map(([t,n])=>`${TYPES[t].icon} ${TYPES[t].name} <b>${Math.min(progress[t]||0,n)} / ${n}</b>`).join('　');}
  function say(kind){let c=companion();$('#dialogue').innerHTML=`<div class="char-face">${c.face}</div><div><b>${c.name}</b><p>${c.lines[kind]}</p></div>`}
  function startGame(){show('playScreen');startStage();} function startStage(){selected=null;busy=false;moves=stage().moves;progress={bear:0,wolf:0,panther:0,moon:0,star:0};initialBoard();renderBoard();renderStatus();say('start');}
  async function tap(r,c){if(busy)return;if(!selected){selected=[r,c];renderBoard();return}let[a,b]=selected;selected=null;if(a===r&&b===c){renderBoard();return}if(Math.abs(a-r)+Math.abs(b-c)!==1){selected=[r,c];renderBoard();return}await swap(a,b,r,c)}
  function addCount(x){if(!x)return;progress[x.type]=(progress[x.type]||0)+1;if(save.counts[x.type]!==undefined)save.counts[x.type]++;}
  function remove(list){let seen=new Set();list.forEach(([r,c])=>{let k=r+','+c;if(!seen.has(k)&&board[r]?.[c]){seen.add(k);addCount(board[r][c]);board[r][c]=null}})}
  function fall(){for(let c=0;c<8;c++){let stack=[];for(let r=7;r>=0;r--)if(board[r][c])stack.push(board[r][c]);for(let r=7;r>=0;r--)board[r][c]=stack.shift()||tile();}}
  const delay=ms=>new Promise(r=>setTimeout(r,ms));
  async function resolve(){let chain=0;while(chain<18){let found=getMatches();if(!found.cells.size)break;chain++;let keep=new Map();for(let run of found.runs){if(run.cells.length>=4){let pick=run.cells.find(([r,c])=>r===lastSwap?.[0]&&c===lastSwap?.[1])||run.cells[Math.floor(run.cells.length/2)];let kind=run.cells.length>=5?'cauldron':run.dir==='h'?'burstH':'burstV';let key=pick.join(',');if(!keep.has(key)||kind==='cauldron')keep.set(key,kind)}}let gone=[...found.cells].map(k=>k.split(',').map(Number)).filter(p=>!keep.has(p.join(',')));remove(gone);for(const[k,sp]of keep){let[r,c]=k.split(',').map(Number);board[r][c]={type:board[r][c]?.type||'moon',special:sp}}renderBoard();renderStatus();await delay(150);fall();renderBoard();await delay(115);}if(chain>1)say('match');if(!hasMove()){initialBoard();toast('盤面を入れ替えたよ');}persist();}
  let lastSwap=null;
  function activateSpecial(r,c,other){let x=board[r][c],cells=[];if(x.special==='cauldron'){for(let R=0;R<8;R++)for(let C=0;C<8;C++)if(!other||board[R][C]?.type===other.type)cells.push([R,C]);}else if(x.special==='burstH'){for(let C=0;C<8;C++)cells.push([r,C]);}else{for(let R=0;R<8;R++)cells.push([R,c]);}remove(cells);}
  async function swap(a,b,r,c){busy=true;let first=board[a][b],second=board[r][c];[board[a][b],board[r][c]]=[second,first];lastSwap=[r,c];let specialCell=board[r][c].special?[r,c]:board[a][b].special?[a,b]:null;let good=getMatches().cells.size>0||specialCell;if(!good){[board[a][b],board[r][c]]=[first,second];renderBoard();toast('3個そろう場所を探してみよう');busy=false;return}moves--;if(specialCell){activateSpecial(...specialCell,specialCell[0]===r&&specialCell[1]===c?board[a][b]:board[r][c]);board[specialCell[0]][specialCell[1]]=null;say('special');fall();renderBoard();await delay(160)}await resolve();renderStatus();if(done())return finish(true);if(moves<=0)return finish(false);persist();busy=false;}
  function done(){return Object.entries(stage().goal).every(([t,n])=>(progress[t]||0)>=n)}
  function finish(win){busy=true;persist();let c=companion();if(!win){say('fail');$('#resultCard').innerHTML=`<h2>もう少し！</h2><p style="text-align:center">${c.name}が、そっとあなたを見守っています。</p><div class="modal-actions"><button id="retry" class="primary">もう一度挑戦する</button><button id="resultHome" class="secondary">館へ戻る</button></div>`;$('#resultModal').classList.add('open');$('#retry').onclick=()=>{$('#resultModal').classList.remove('open');startStage()};$('#resultHome').onclick=()=>{$('#resultModal').classList.remove('open');show('homeScreen');renderHome()};return}lastStageCompleted=save.current;save.completed=Math.max(save.completed,save.current);save.companionClears[save.selected]++;if(!save.items.includes(save.current)&&ITEMS.some(x=>x.stage===save.current))save.items.push(save.current);if(save.current<10)save.unlocked=Math.max(save.unlocked,save.current+1);persist();renderBook();say('clear');let reward=ITEMS.find(x=>x.stage===lastStageCompleted),final=lastStageCompleted===10;$('#resultCard').innerHTML=`<h2>${final?'館の魔法を極めた！':'STAGE CLEAR!'}</h2><p style="text-align:center">${c.name}「${c.lines.clear}」</p>${reward?`<div class="reward">${reward.icon}　${reward.name} を手に入れた！</div>`:''}<div class="modal-actions"><button id="next" class="primary">${final?'もう一度遊ぶ':'次のステージへ'}</button><button id="resultHome" class="secondary">館へ戻る</button></div>`;$('#resultModal').classList.add('open');$('#next').onclick=()=>{$('#resultModal').classList.remove('open');if(!final)save.current++;persist();startStage()};$('#resultHome').onclick=()=>{$('#resultModal').classList.remove('open');show('homeScreen');renderHome()};}
  function renderBook(){let owned=new Set(save.items);$('#itemsPage').innerHTML=`<div class="collection">${ITEMS.map(x=>`<article class="collect ${owned.has(x.stage)?'':'locked'}"><span class="item-icon">${owned.has(x.stage)?x.icon:'🔒'}</span><b>${owned.has(x.stage)?x.name:'？？？？？？'}</b><p>${owned.has(x.stage)?x.text:'館のどこかで、まだ見つかっていない品。'}</p><small>${owned.has(x.stage)?`STAGE ${x.stage} で入手`:'未入手'}</small></article>`).join('')}</div>`;$('#achievementsPage').innerHTML=`<div class="achievements">${ACH.map(a=>{let ok=a.ok(save);return `<article class="achievement ${ok?'':'locked'}"><span class="ach-icon">${ok?a.icon:'🔒'}</span><div><b>${ok?a.name:'？？？？？？'}</b><p>${a.text}</p></div></article>`}).join('')}</div>`;}
  $('#startBtn').onclick=startGame;$('#bookBtn').onclick=()=>{renderBook();show('bookScreen')};$('#settingsBtn').onclick=()=>{$('#settingsModal').classList.add('open')};$('#backHomeBtn').onclick=()=>{show('homeScreen');renderHome();persist()};$$('.backHome').forEach(b=>b.onclick=()=>{show('homeScreen');renderHome()});$('#restartBtn').onclick=()=>{if(confirm('このステージを最初からやり直しますか？'))startStage()};$$('.tab').forEach(t=>t.onclick=()=>{$$('.tab').forEach(x=>x.classList.toggle('active',x===t));$$('.book-page').forEach(x=>x.classList.remove('active'));$('#'+t.dataset.tab+'Page').classList.add('active')});$$('.closeModal').forEach(b=>b.onclick=()=>b.closest('.modal').classList.remove('open'));
  $('#exportBtn').onclick=async()=>{let text=btoa(unescape(encodeURIComponent(JSON.stringify(save))));$('#saveText').value=text;try{await navigator.clipboard.writeText(text);toast('セーブデータをコピーしたよ')}catch{toast('文字列をコピーして保管してね')}};
  $('#importBtn').onclick=()=>{try{let s=JSON.parse(decodeURIComponent(escape(atob($('#saveText').value.trim()))));if(!s.current)throw 0;if(confirm('現在のセーブデータを上書きしますか？')){save={...fresh(),...s,counts:{...fresh().counts,...s.counts},companionClears:{...fresh().companionClears,...s.companionClears}};persist();$('#settingsModal').classList.remove('open');renderHome();renderBook();toast('セーブデータを読み込んだよ')}}catch{toast('読み込めないデータです')}};
  $('#resetBtn').onclick=()=>{if(confirm('集めたアイテム・実績・進行状況をすべて初期化します。本当によろしいですか？')){save=fresh();persist();$('#settingsModal').classList.remove('open');renderHome();renderBook();toast('データを初期化したよ')}};
  renderHome();renderBook();
})();
</script>
