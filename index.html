<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#261b38">
  <title>魔女の館のモフモフパズル</title>
  <style>
    :root{--ink:#2d2034;--plum:#4f315f;--deep:#271b38;--paper:#fff8e9;--gold:#e9c26b;--pink:#e39aae;--mint:#9dcfb7;--line:#d9bf9c}
    *{box-sizing:border-box} html,body{max-width:100%;overflow-x:hidden} body{margin:0;color:var(--ink);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;background:radial-gradient(circle at top,#76527a 0,#30213f 48%,#1c1827 100%);min-height:100vh}
    button{font:inherit;touch-action:manipulation;-webkit-tap-highlight-color:transparent} .app{width:100%;max-width:560px;margin:auto;min-height:100vh;padding:env(safe-area-inset-top) 14px calc(22px + env(safe-area-inset-bottom));overflow-x:hidden}
    .screen{display:none;min-height:calc(100vh - env(safe-area-inset-top) - 22px)}.screen.active{display:flex;flex-direction:column}.game-logo{display:block;width:min(100%,540px);height:auto;margin:14px auto 7px;filter:drop-shadow(0 3px 8px #160b2588)}
    .paper{background:linear-gradient(135deg,#fffaf0,#f5e9d1);border:2px solid var(--gold);border-radius:18px;box-shadow:0 8px 20px #0d081a66, inset 0 0 0 4px #fff8e988;padding:16px}.home-hero{position:relative;text-align:center;padding:20px 15px 17px;background-image:linear-gradient(135deg,rgba(255,250,240,.90),rgba(255,243,220,.70)),url('https://raw.githubusercontent.com/nonoygk/mofupaz/main/ui/room.png');background-position:center;background-size:cover}.home-copy{font-size:13px;line-height:1.8;margin:0 auto 14px;max-width:350px}.selected-box{display:flex;align-items:center;gap:10px;text-align:left;background:#fffaf0d9;border:1px dashed #c7a873;border-radius:14px;padding:8px 10px}.char-face{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;font-size:31px;flex:none;background:#fff;overflow:hidden;box-shadow:0 2px 5px #92744555}.portrait{width:100%;height:100%;display:block;object-fit:cover;object-position:center 13%}.char-name{font-family:serif;font-weight:bold;font-size:18px}.char-desc{font-size:11px;color:#6f5a61;margin-top:2px}
    .primary,.secondary,.tiny{border:0;border-radius:999px;font-weight:bold;cursor:pointer}.primary{background:linear-gradient(#bb6d94,#84436d);color:#fff9ec;box-shadow:0 4px 0 #592945;padding:14px 20px;font-size:17px}.primary:active{transform:translateY(3px);box-shadow:0 1px 0 #592945}.secondary{background:#fff8e8;color:#55324f;border:2px solid #c99d63;padding:10px 14px}.tiny{background:#ead7b5;color:#533849;border:1px solid #c9a56d;padding:6px 9px;font-size:12px}.home-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:15px 0}.home-actions .primary{grid-column:span 2}.section-title{font-family:serif;font-size:20px;color:#f9e8bf;text-shadow:0 1px #392142;margin:18px 2px 9px}.companions{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.companion{padding:9px 4px 8px;border:2px solid transparent;border-radius:15px;background:#fdf4e3;cursor:pointer;color:var(--ink)}.companion.selected{border-color:#cf7396;background:#fffdf6;box-shadow:0 0 0 2px #f6d29a}.companion .face{display:block;width:58px;height:58px;margin:0 auto 3px;border-radius:50%;object-fit:cover;object-position:center 13%;background:#fff;box-shadow:0 1px 4px #83634c55}.companion b{font-family:serif;font-size:15px}.companion small{display:block;font-size:10px;color:#715b62;margin-top:2px}
    .save-note{text-align:center;color:#dcc7dc;font-size:11px;margin:12px 0 0}.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 0 8px;color:#fff5dd}.topbar button{color:#fff5dd;background:#ffffff1c;border:1px solid #f6d89666;border-radius:99px;padding:7px 11px}.stage-name{font-family:serif;font-size:19px}.stage-sub{font-size:10px;color:#dac3dc;text-align:center}.status{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;background:#fff7e7;border:2px solid var(--gold);border-radius:15px;padding:8px 10px;margin-bottom:10px}.mission{font-size:12px;line-height:1.65}.moves{text-align:center;background:var(--deep);color:#fff7e9;border-radius:11px;padding:6px 9px;min-width:64px}.moves b{display:block;font-family:serif;font-size:23px;line-height:1}.moves span{font-size:10px;color:#e7c7ab}
    .dialogue{min-height:58px;background:linear-gradient(135deg,#fffdf8,#efe2d2);border:2px solid #d4b478;border-radius:15px;padding:8px 11px;display:flex;gap:9px;align-items:center;margin-top:11px;box-shadow:0 4px 12px #160b2550}.dialogue .char-face{width:39px;height:39px;font-size:25px}.dialogue b{display:block;font-family:serif;font-size:14px;color:#6b3856}.dialogue p{font-size:12px;line-height:1.45;margin:2px 0 0}.board-wrap{width:100%;max-width:100%;overflow:hidden;background:linear-gradient(135deg,#61436c,#342642);border:3px solid #e2bf74;border-radius:19px;padding:8px;box-shadow:0 8px 18px #0d07168c}.board{display:grid;width:100%;grid-template-columns:repeat(8,minmax(0,1fr));gap:3px}.tile{min-width:0;padding:0;aspect-ratio:1/1;border:0;border-radius:10px;display:grid;place-items:center;font-size:clamp(20px,8.5vw,39px);cursor:pointer;position:relative;overflow:hidden;box-shadow:inset 0 -3px #00000022,0 1px 2px #00000066;background:#fff;transition:transform .12s,filter .12s}.tile:active{transform:scale(.91)}.tile.selected{outline:3px solid #fff0a9;outline-offset:1px;transform:scale(1.06);z-index:2}.piece-image{display:block;width:100%;height:100%;object-fit:cover}.tile.bear,.tile.wolf,.tile.panther{border-radius:50%;background:transparent;box-shadow:none}.tile.bear .piece-image,.tile.wolf .piece-image,.tile.panther .piece-image{border-radius:50%}.magic-symbol{display:grid;place-items:center;width:100%;height:100%;line-height:1;transform:translateY(-5%)}.tile.moon{background:linear-gradient(135deg,#e3ffd7,#73bd74)}.tile.star{background:linear-gradient(135deg,#ffe6f5,#e981bd)}.tile.special{animation:specialPulse 1.1s ease-in-out infinite;z-index:1}.special-mark{position:absolute;right:-1px;top:-2px;width:48%;aspect-ratio:1;display:grid;place-items:center;border-radius:50%;font-size:clamp(11px,4vw,18px);line-height:1;color:#fffdf1;text-shadow:0 1px 2px #3a154c;background:linear-gradient(135deg,#8a59d4,#e17abb);box-shadow:0 1px 4px #25102d99}.tile.burst .special-mark{background:linear-gradient(135deg,#f5be54,#df67b5)}@keyframes specialPulse{50%{transform:scale(1.08);filter:brightness(1.14)}}.tile.clearing{animation:pop .22s ease both}@keyframes pop{to{transform:scale(.18) rotate(18deg);opacity:0}}.fx-layer{position:fixed;inset:0;z-index:25;pointer-events:none;overflow:hidden}.spark{position:fixed;width:8px;height:8px;border-radius:50%;background:var(--spark,#fff6ab);box-shadow:0 0 8px var(--spark,#fff6ab);animation:sparkFly .48s ease-out forwards}.spark.star{clip-path:polygon(50% 0,61% 36%,100% 50%,61% 64%,50% 100%,39% 64%,0 50%,39% 36%)}@keyframes sparkFly{to{transform:translate(var(--dx),var(--dy)) scale(.05) rotate(160deg);opacity:0}}.combo-pop{position:fixed;z-index:26;transform:translate(-50%,-50%);font-family:serif;font-size:clamp(18px,6vw,31px);font-weight:bold;color:#fff6c9;text-shadow:0 2px 0 #74385d,0 0 12px #f2a2c8;animation:comboUp .78s ease-out forwards;white-space:nowrap}@keyframes comboUp{0%{transform:translate(-50%,-25%) scale(.5);opacity:0}25%{transform:translate(-50%,-50%) scale(1.2);opacity:1}100%{transform:translate(-50%,-100%);opacity:0}}
    .book{background:#f8efd9;border:5px solid #5b3945;box-shadow:inset 0 0 0 2px #d9ba75,0 7px 18px #0e071466;border-radius:8px 17px 17px 8px;min-height:420px;padding:17px}.book h2{font-family:serif;color:#5b3447;margin:0;text-align:center;font-size:24px}.book-intro{text-align:center;font-size:11px;color:#765d62;margin:4px 0 14px}.tabs{display:flex;border-bottom:2px solid #d5b77e;margin-bottom:13px}.tab{flex:1;border:0;background:transparent;color:#6a4557;padding:8px;font-weight:bold}.tab.active{background:#e8d6a5;border-radius:10px 10px 0 0}.book-page{display:none}.book-page.active{display:block}.collection{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.collect{min-height:113px;background:#fffaf0;border:1px solid #d9bf8e;border-radius:11px;padding:9px;position:relative}.collect.locked{filter:grayscale(1);opacity:.55}.collect .item-icon{font-size:33px;float:left;margin:0 7px 3px 0}.collect b{font-family:serif;font-size:15px}.collect p{font-size:10px;line-height:1.45;margin:5px 0}.collect small{display:block;font-size:10px;color:#9b6f64}.achievements{display:grid;gap:7px}.achievement{display:flex;align-items:center;gap:9px;background:#fffaf0;border:1px solid #d7be8c;border-radius:10px;padding:7px}.achievement.locked{filter:grayscale(1);opacity:.52}.ach-icon{font-size:27px;width:33px;text-align:center}.achievement b{font-family:serif;font-size:14px}.achievement p{font-size:10px;margin:2px 0 0;color:#725f5e}.modal{position:fixed;inset:0;z-index:10;background:#100819a8;display:none;place-items:center;padding:20px}.modal.open{display:grid}.modal-card{width:min(440px,100%);max-height:85vh;overflow:auto;background:#fff7e7;border:3px solid #e4bf72;border-radius:20px;padding:20px;box-shadow:0 8px 30px #09040d}.modal-card h2{font-family:serif;color:#5c324c;text-align:center;margin:0 0 8px}.modal-card p{font-size:13px;line-height:1.7}.reward{font-family:serif;background:#f5dfae;border-radius:13px;padding:11px;text-align:center;font-size:17px}.modal-actions{display:flex;gap:9px;justify-content:center;margin-top:14px;flex-wrap:wrap}.field-label{font-weight:bold;font-size:13px;display:block;margin:11px 0 5px}.data-box{width:100%;min-height:86px;border:1px solid #c7a468;border-radius:9px;padding:8px;font-size:11px;background:#fffdf7;resize:vertical}.notice{font-size:11px;color:#765b5e}.toast{position:fixed;z-index:30;left:50%;bottom:calc(20px + env(safe-area-inset-bottom));transform:translate(-50%,200%);opacity:0;visibility:hidden;pointer-events:none;transition:transform .24s,opacity .18s;background:#2c1c36;color:#fff8e6;border:1px solid #e6c57d;padding:10px 15px;border-radius:99px;font-size:12px;box-shadow:0 4px 12px #0008}.toast.show{transform:translate(-50%,0);opacity:1;visibility:visible}
    .item-category,.achievement-category{display:inline-block;font-size:9px;line-height:1.2;color:#6c4d54;background:#f3e3bb;border:1px solid #d8ba7e;border-radius:99px;padding:3px 6px;margin:0 0 4px}.collect b{display:block}.records{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}.records article{background:#fffaf0;border:1px solid #d7be8c;border-radius:11px;padding:12px 9px;text-align:center}.records span{display:block;font-size:10px;color:#765d62;margin-bottom:5px}.records b{display:block;font-family:serif;color:#5b3447;font-size:17px}
    @media(min-width:540px){.app{padding-left:22px;padding-right:22px}.tile{border-radius:18px}}
  </style>
</head>
<body>
<main class="app">
  <section id="homeScreen" class="screen active">
    <img class="game-logo" src="https://raw.githubusercontent.com/nonoygk/mofupaz/main/ui/logo.png" alt="魔女の館のモフモフパズル">
    <div class="paper home-hero"><p class="home-copy">三人の獣人とともに、魔法のピースをそろえよう。<br>館で見つけた品々は、あなたの手帳に記されていく。</p><div id="homeSelected" class="selected-box"></div></div>
    <div class="home-actions"><button id="startBtn" class="primary">パズルをはじめる</button><button id="bookBtn" class="secondary">✦ 魔女の手帳</button><button id="settingsBtn" class="secondary">⚙ セーブデータ</button></div>
    <h2 class="section-title">一緒に遊ぶ相手</h2><div id="companions" class="companions"></div><p class="save-note">進行状況はこの端末に自動保存されます。</p>
  </section>
  <section id="playScreen" class="screen">
    <div class="topbar"><button id="backHomeBtn">〈 館へ戻る</button><div><div id="stageName" class="stage-name">STAGE 1</div><div id="stageSub" class="stage-sub"></div></div><button id="restartBtn">↻ やり直す</button></div>
    <div class="status"><div id="mission" class="mission"></div><div class="moves"><b id="moves">20</b><span>のこり手数</span></div></div>
    <div class="board-wrap"><div id="board" class="board" aria-label="パズル盤面"></div></div><div id="dialogue" class="dialogue"></div>
  </section>
  <section id="bookScreen" class="screen"><div class="topbar"><button class="backHome">〈 館へ戻る</button><div class="stage-name">魔女の手帳</div><span></span></div><div class="book"><h2>魔女の手帳</h2><p class="book-intro">館で紡いだ、小さな記録。</p><div class="tabs"><button class="tab active" data-tab="items">収集品</button><button class="tab" data-tab="achievements">実績</button><button class="tab" data-tab="records">記録</button></div><div id="itemsPage" class="book-page active"></div><div id="achievementsPage" class="book-page"></div><div id="recordsPage" class="book-page"></div></div></section>
</main>
<div id="resultModal" class="modal"><div class="modal-card" id="resultCard"></div></div>
<div id="settingsModal" class="modal"><div class="modal-card"><h2>セーブデータの移行</h2><p>機種変更などのときは、文字列を書き出して保管できます。読み込みを行うと、現在のデータは上書きされます。</p><label class="field-label" for="saveText">セーブデータ</label><textarea id="saveText" class="data-box" placeholder="ここに読み込み用の文字列を貼り付けます"></textarea><div class="modal-actions"><button id="exportBtn" class="secondary">書き出す</button><button id="importBtn" class="primary">読み込む</button></div><p class="notice">※大切なデータは、書き出した文字列をメモなどに保管してね。</p><div class="modal-actions"><button id="resetBtn" class="tiny">すべてのデータを初期化</button><button class="tiny closeModal">閉じる</button></div></div></div>
<div id="toast" class="toast"></div>
<div id="fxLayer" class="fx-layer" aria-hidden="true"></div>
<script>
(() => {
  const KEY='mofupuzz-save-v1';
  const TYPES={bear:{icon:'🐻‍❄️',image:'https://raw.githubusercontent.com/nonoygk/mofupaz/main/ui/kuma.png',name:'白熊'},wolf:{icon:'🐺',image:'https://raw.githubusercontent.com/nonoygk/mofupaz/main/ui/ohkami.png',name:'金狼'},panther:{icon:'🐈‍⬛',image:'https://raw.githubusercontent.com/nonoygk/mofupaz/main/ui/hyou.png',name:'黒豹'},moon:{icon:'🌙',name:'月の魔法石'},star:{icon:'⭐',name:'星の魔法石'}};
  const CHARACTERS={balto:{name:'バルト',face:'🐻‍❄️',portrait:'https://raw.githubusercontent.com/nonoygk/mofupaz/main/characters/balto.png',desc:'寡黙な白熊の守護者',lines:{start:'……盤面をよく見ろ。焦らなくていい。',guide:'……淡く光る二つを、入れ替えてみろ。',notAdjacent:'隣り合うピースを選び直してみろ。',noMatch:'3個そろわない組み合わせだ。別の場所を試してみろ。',match:'悪くない。お前らしい魔法だ。',special:'……見事だ。俺まで少し、熱くなる。',clear:'よくやった。温かい茶を淹れておく。',fail:'大丈夫だ。もう一度、俺とやろう。'}},philo:{name:'フィロ',face:'🐺',portrait:'https://raw.githubusercontent.com/nonoygk/mofupaz/main/characters/Philo.png',desc:'笑顔の奥に本心を隠す金狼',lines:{start:'今日はどんな魔法を見せてくれるのかな？',guide:'淡く光る二つを入れ替えてみて。きっと、きれいにそろうよ。',notAdjacent:'お隣同士のピースを選んでみて、魔女さん。',noMatch:'惜しいな。その組み合わせでは消えないみたい。別の場所を探そうか。',match:'ふふ、今の連鎖、きれいだったよ。',special:'おや、すごい。君のこと、もっと見たくなるね。',clear:'おつかれさま、魔女さん。ご褒美もあるみたい。',fail:'惜しかったね。でも、君となら何度でも遊びたいな。'}},judah:{name:'ジュダ',face:'🐈‍⬛',portrait:'https://raw.githubusercontent.com/nonoygk/mofupaz/main/characters/Judah.png',desc:'情熱的で世話焼きな黒豹',lines:{start:'よし、俺がそばにいる。派手にいこうぜ！',guide:'光ってる二つを入れ替えてみな。ちゃんと消える組み合わせだぜ。',notAdjacent:'隣り合ったピースを選ぼうぜ。焦らなくていいからな。',noMatch:'あー、惜しい！ そこじゃ3個そろわねぇな。別の組み合わせを探そうぜ。',match:'いいぞ！ そのまま畳みかけろ！',special:'うおっ、今の見たか!? 最高じゃねぇか！',clear:'やったな！ ほら、ちゃんと誇っていいぞ。',fail:'まだ終わりじゃねぇ。次は絶対、決めようぜ。'}}};
  const STAGES=[
    {moves:20,goal:{bear:10},note:'まずは白熊のピースを集めよう'},
    {moves:20,goal:{wolf:12},note:'金狼のピースを集めよう'},
    {moves:20,goal:{panther:14},note:'黒豹のピースを集めよう'},
    {moves:22,goal:{moon:12,star:12},note:'ふたつの魔法石を集めよう'},
    {moves:22,goal:{bear:13,wolf:13},note:'白熊と金狼をそろえよう'},
    {moves:23,goal:{panther:16,moon:14},note:'黒豹と月の魔法石を集めよう'},
    {moves:24,goal:{bear:19,star:16},note:'白熊と星の魔法石を集めよう'},
    {moves:24,goal:{wolf:20,panther:18},note:'金狼と黒豹をそろえよう'},
    {moves:25,goal:{moon:22,star:22},note:'月と星の魔法を重ねよう'},
    {moves:28,goal:{bear:16,wolf:16,panther:16},note:'三人の獣人の力を集めよう'}
  ];
  const ITEM_CATEGORIES={food:{icon:'🍪',name:'食べもの'},drink:{icon:'🫖',name:'飲みもの'},plant:{icon:'🌿',name:'草花・薬草'},magic:{icon:'🔮',name:'魔法道具'},accessory:{icon:'🎀',name:'小物・装身具'},paper:{icon:'📜',name:'書物・手紙'}};
  const ITEMS=[
    {stage:1,category:'drink',name:'白花のハーブティー',text:'バルトが温室で摘んだ、身体を温める香り高い茶葉。'},
    {stage:2,category:'food',name:'月桂蜜のクッキー',text:'フィロが見つけてきた、ほのかに甘い焼き菓子。'},
    {stage:4,category:'accessory',name:'雪白のマフラー',text:'北方の織り糸で作られた、なめらかな白い贈り物。'},
    {stage:6,category:'food',name:'深紅のベリージャム',text:'ジュダが森で採った実を、丁寧に煮詰めたもの。'},
    {stage:8,category:'magic',name:'星屑の小瓶',text:'夜の庭に舞う光を、そっと閉じ込めた小瓶。'},
    {stage:10,category:'paper',name:'古い魔導書',text:'あなたの魔法の系譜を記した、館に伝わる一冊。'},
    {stage:15,category:'food',name:'凍月の飴箱',text:'口に入れると、ひんやりと月明かりの香りが広がる。'},
    {stage:20,category:'plant',name:'月桂の苗木',text:'館の庭で育てれば、魔除けの香りを宿す小さな苗。'},
    {stage:30,category:'accessory',name:'黒曜の髪飾り',text:'深い夜色の石を削った、気品ある髪飾り。'},
    {stage:40,category:'magic',name:'夜星の香油',text:'星明かりを映す香油。小さな魔法の焦点を整える。'},
    {stage:50,category:'accessory',name:'古びた館の鍵',text:'まだ開けたことのない扉に合いそうな、重い真鍮の鍵。'},
    {stage:75,category:'paper',name:'金狼の旅日誌',text:'森の小径と、フィロらしい軽やかな文字が残された手帳。'},
    {stage:100,category:'magic',name:'月光のお守り',text:'月の加護を閉じ込めた、魔女のための小さな護符。'},
    {stage:150,category:'food',name:'森苺のタルト',text:'三人と分け合うために焼かれた、甘酸っぱいご褒美。'},
    {stage:200,category:'plant',name:'白花の押し花栞',text:'最初のハーブティーを思い出す、白い花びらの栞。'},
    {stage:300,category:'accessory',name:'黒豹の革紐',text:'ジュダが選んだ、丈夫で使い込むほど馴染む革紐。'},
    {stage:500,category:'paper',name:'三人の誓約書',text:'館と森を守るための、獣人たちの古い約束が綴られている。'},
    {stage:1000,category:'magic',name:'大魔女の魔導書',text:'長い旅を記録するため、あなたの名を刻む余白が残されている。'}
  ];
  const ACH_CATEGORIES={progress:{icon:'✦',name:'進行'},collection:{icon:'📖',name:'収集'},pieces:{icon:'🐾',name:'ピース消去'},companion:{icon:'🤝',name:'一緒にプレイ'}};
  const ACH=[

    {id:'judah50',category:'companion',name:'漆黒の信頼',text:'ジュダと50ステージクリアする',ok:s=>s.companionClears.judah>=50}
  ];
  const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
  const fresh=()=>({current:1,unlocked:1,completed:0,highestStage:0,totalClears:0,selected:'balto',items:[],counts:{bear:0,wolf:0,panther:0,moon:0,star:0},companionClears:{balto:0,philo:0,judah:0}});
  let save=load(), board=[], selected=null, moves=0, progress={}, busy=false, lastStageCompleted=0;
  function load(){try{let s=JSON.parse(localStorage.getItem(KEY));return {...fresh(),...s,counts:{...fresh().counts,...s.counts},companionClears:{...fresh().companionClears,...s.companionClears}}}catch{return fresh()}}
  function persist(){localStorage.setItem(KEY,JSON.stringify(save));}
  function show(id){$$('.screen').forEach(x=>x.classList.remove('active'));$('#'+id).classList.add('active');window.scrollTo(0,0)}
  function toast(t){const e=$('#toast');e.textContent=t;e.classList.add('show');clearTimeout(toast.timer);toast.timer=setTimeout(()=>e.classList.remove('show'),2200)}
  function companion(){return CHARACTERS[save.selected]}
  function renderHome(){let c=companion();$('#homeSelected').innerHTML=`<div class="char-face"><img class="portrait" src="${c.portrait}" alt="${c.name}"></div><div><div class="char-name">${c.name}とプレイ中</div><div class="char-desc">${c.desc}</div></div>`;$('#companions').innerHTML=Object.entries(CHARACTERS).map(([id,x])=>`<button class="companion ${id===save.selected?'selected':''}" data-char="${id}"><img class="face" src="${x.portrait}" alt="${x.name}"><b>${x.name}</b><small>${x.desc}</small></button>`).join('');$$('[data-char]').forEach(b=>b.onclick=()=>{save.selected=b.dataset.char;persist();renderHome();toast(`${CHARACTERS[save.selected].name}と一緒に遊ぶよ`)});}
  function type(){return Object.keys(TYPES)[Math.floor(Math.random()*5)]}
  function tile(t=type()){return {type:t}}; function valid(r,c){return r>=0&&r<8&&c>=0&&c<8}
  function initialBoard(){do{board=[];for(let r=0;r<8;r++){board[r]=[];for(let c=0;c<8;c++){let t;do{t=type()}while((c>=2&&board[r][c-1].type===t&&board[r][c-2].type===t)||(r>=2&&board[r-1][c].type===t&&board[r-2][c].type===t));board[r][c]=tile(t)}}}while(!hasMove());}
  function getMatches(){let matches=new Set();for(let r=0;r<8;r++){let start=0;while(start<8){let end=start+1;while(end<8&&board[r][end].type===board[r][start].type)end++;if(end-start>=3)for(let c=start;c<end;c++)matches.add(`${r}:${c}`);start=end}}for(let c=0;c<8;c++){let start=0;while(start<8){let end=start+1;while(end<8&&board[end][c].type===board[start][c].type)end++;if(end-start>=3)for(let r=start;r<end;r++)matches.add(`${r}:${c}`);start=end}}return matches}
  function hasMove(){for(let r=0;r<8;r++)for(let c=0;c<8;c++)for(const[dR,dC]of [[1,0],[0,1]]){let R=r+dR,C=c+dC;if(!valid(R,C))continue;[board[r][c],board[R][C]]=[board[R][C],board[r][c]];let yes=getMatches().size>0;[board[r][c],board[R][C]]=[board[R][C],board[r][c]];if(yes)return true}return false}
  function typeMarkup(piece){let info=TYPES[piece.type],mark=piece.special?`<span class="special-mark">${piece.special==='burst'?'✹':piece.special==='beamH'?'↔':'↕'}</span>`:'';return `${info.image?`<img class="piece-image" src="${info.image}" alt="">`:`<span class="magic-symbol">${info.icon}</span>`}${mark}`}
  function renderBoard(){let html='';for(let r=0;r<8;r++)for(let c=0;c<8;c++){let x=board[r][c],special=x.special?`special ${x.special}`:'';html+=`<button class="tile ${x.type} ${special} ${selected&&selected[0]===r&&selected[1]===c?'selected':''}" data-r="${r}" data-c="${c}" aria-label="${TYPES[x.type].name}${x.special?' 特殊ピース':''}">${typeMarkup(x)}</button>`}$('#board').innerHTML=html;$$('.tile').forEach(b=>b.onclick=()=>tap(+b.dataset.r,+b.dataset.c));}
  function seeded(seed){let x=Math.sin(seed*12.9898)*43758.5453;return x-Math.floor(x)}
  function generatedStage(number){let pick=i=>Object.keys(TYPES)[Math.floor(seeded(number*17+i*31)*5)],targets=[],roll=seeded(number*7+3);let count=number<25?1:number<60?(roll<.68?2:1):(roll<.16?3:roll<.72?2:1);while(targets.length<count){let t=pick(targets.length+1);if(!targets.includes(t))targets.push(t)}let goal={},moves;if(count===1){goal[targets[0]]=18+Math.floor(seeded(number+4)*8);moves=20+Math.floor(seeded(number+8)*3)}else if(count===2){targets.forEach((t,i)=>goal[t]=11+Math.floor(seeded(number+i*5+9)*6));moves=21+Math.floor(seeded(number+13)*3)}else{targets.forEach((t,i)=>goal[t]=9+Math.floor(seeded(number+i*7+16)*4));moves=23+Math.floor(seeded(number+19)*3)}let names=targets.map(t=>TYPES[t].name).join('と');return {moves,goal,note:`自動生成の試練：${names}を集めよう`}}
  function stage(){return STAGES[save.current-1]||generatedStage(save.current)} function renderStatus(){let s=stage();$('#stageName').textContent=`STAGE ${save.current}`;$('#stageSub').textContent=s.note;$('#moves').textContent=moves;$('#mission').innerHTML='<b>目標</b><br>'+Object.entries(s.goal).map(([t,n])=>`${TYPES[t].icon} ${TYPES[t].name} <b>${Math.min(progress[t]||0,n)} / ${n}</b>`).join('　');}
  function say(kind){let c=companion();$('#dialogue').innerHTML=`<div class="char-face"><img class="portrait" src="${c.portrait}" alt="${c.name}"></div><div><b>${c.name}</b><p>${c.lines[kind]}</p></div>`}
  function startGame(){show('playScreen');startStage();} function startStage(){selected=null;busy=false;moves=stage().moves;progress={bear:0,wolf:0,panther:0,moon:0,star:0};initialBoard();renderBoard();renderStatus();say('start');}
  function tap(r,c){if(busy)return;if(board[r][c].special){selected=null;activateSpecial(r,c);return}if(!selected){selected=[r,c];renderBoard();return}let[a,b]=selected;selected=null;if(a===r&&b===c){renderBoard();return}if(Math.abs(a-r)+Math.abs(b-c)!==1){selected=[r,c];renderBoard();say('notAdjacent');return}swap(a,b,r,c)}
  function addCount(x){if(!x)return;progress[x.type]=(progress[x.type]||0)+1;if(save.counts[x.type]!==undefined)save.counts[x.type]++;}
  function keyOf(r,c){return `${r}:${c}`} function fromKey(key){return key.split(':').map(Number)}
  function addKey(set,r,c){if(valid(r,c)&&board[r][c])set.add(keyOf(r,c))}
  function blastSpecials(matches){let queue=[...matches],seen=new Set();while(queue.length){let key=queue.shift();if(seen.has(key))continue;seen.add(key);let[r,c]=fromKey(key),piece=board[r][c];if(!piece||!piece.special)continue;let targets=[];if(piece.special==='beamH')for(let C=0;C<8;C++)targets.push([r,C]);else if(piece.special==='beamV')for(let R=0;R<8;R++)targets.push([R,c]);else for(let R=r-1;R<=r+1;R++)for(let C=c-1;C<=c+1;C++)targets.push([R,C]);targets.forEach(([R,C])=>{let before=matches.size;addKey(matches,R,C);if(matches.size>before)queue.push(keyOf(R,C))})}return matches}
  function lineLengths(r,c){let piece=board[r][c],h=1,v=1;for(let C=c-1;C>=0&&board[r][C].type===piece.type;C--)h++;for(let C=c+1;C<8&&board[r][C].type===piece.type;C++)h++;for(let R=r-1;R>=0&&board[R][c].type===piece.type;R--)v++;for(let R=r+1;R<8&&board[R][c].type===piece.type;R++)v++;return {h,v}}
  function makeSpecial(matches,preferred){if(matches.size<4)return null;let key=preferred&&matches.has(keyOf(...preferred))?keyOf(...preferred):[...matches][0], [r,c]=fromKey(key),{h,v}=lineLengths(r,c),kind=(matches.size>=5||h>=3&&v>=3)?'burst':h>=4?'beamH':'beamV';board[r][c].special=kind;matches.delete(key);return kind}
  function clearEffects(matches,combo,label){let keys=[...matches],boardBox=$('#board').getBoundingClientRect();keys.forEach((key,index)=>{let[r,c]=fromKey(key),tile=$(`.tile[data-r="${r}"][data-c="${c}"]`);if(tile)tile.classList.add('clearing');let rect=tile?tile.getBoundingClientRect():boardBox;for(let i=0;i<(keys.length>10?1:2);i++){let spark=document.createElement('i'),angle=(Math.PI*2*(index+i*.5))/Math.max(1,keys.length),distance=20+Math.random()*30;spark.className=`spark ${i?'star':''}`;spark.style.left=`${rect.left+rect.width/2}px`;spark.style.top=`${rect.top+rect.height/2}px`;spark.style.setProperty('--dx',`${Math.cos(angle)*distance}px`);spark.style.setProperty('--dy',`${Math.sin(angle)*distance-12}px`);spark.style.setProperty('--spark',label?'#ffd36b':i?'#ffd7f0':'#fff4a8');$('#fxLayer').append(spark);setTimeout(()=>spark.remove(),520)}});if(combo>1||label){let pop=document.createElement('div');pop.className='combo-pop';pop.textContent=label||`${combo} COMBO!`;pop.style.left=`${boardBox.left+boardBox.width/2}px`;pop.style.top=`${boardBox.top+boardBox.height*.45}px`;$('#fxLayer').append(pop);setTimeout(()=>pop.remove(),820)}}
  function remove(matches){matches.forEach(key=>{let[r,c]=fromKey(key);addCount(board[r][c]);board[r][c]=null})}
  function fall(){for(let c=0;c<8;c++){let stack=[];for(let r=7;r>=0;r--)if(board[r][c])stack.push(board[r][c]);for(let r=7;r>=0;r--)board[r][c]=stack.shift()||tile();}}
  function resolve(initialMatches=null,preferred=null){let cascades=0,matches=initialMatches||getMatches(),made=preferred?makeSpecial(matches,preferred):null;while(matches.size>0&&cascades<18){if(cascades>0)made=makeSpecial(matches);blastSpecials(matches);clearEffects(matches,cascades+1,made?(made==='burst'?'星屑の魔法石！':'月光の魔法石！'):null);remove(matches);fall();cascades++;matches=getMatches();made=null}if(cascades>1)say('match');if(!hasMove()){initialBoard();toast('動かせる場所がなくなったため、盤面を入れ替えたよ。')}persist();}
  function afterMove(){renderBoard();renderStatus();if(done())return finish(true);if(moves<=0)return finish(false);busy=false;}
  function activateSpecial(r,c){busy=true;moves--;let kind=board[r][c].special;say('special');resolve(new Set([keyOf(r,c)]));clearEffects(new Set(),0,kind==='burst'?'星屑がはじけた！':'月光が走った！');afterMove()}
  function swap(a,b,r,c){busy=true;[board[a][b],board[r][c]]=[board[r][c],board[a][b]];let matches=getMatches();if(matches.size===0){[board[a][b],board[r][c]]=[board[r][c],board[a][b]];renderBoard();say('noMatch');busy=false;return}moves--;resolve(matches,[r,c]);afterMove();}
  function done(){return Object.entries(stage().goal).every(([t,n])=>(progress[t]||0)>=n)}
  function finish(win){busy=true;persist();let c=companion();if(!win){say('fail');$('#resultCard').innerHTML=`<h2>もう少し！</h2><p style="text-align:center">${c.name}が、そっとあなたを見守っています。</p><div class="modal-actions"><button id="retry" class="primary">もう一度挑戦する</button><button id="resultHome" class="secondary">館へ戻る</button></div>`;$('#resultModal').classList.add('open');$('#retry').onclick=()=>{$('#resultModal').classList.remove('open');startStage()};$('#resultHome').onclick=()=>{$('#resultModal').classList.remove('open');show('homeScreen');renderHome()};return}lastStageCompleted=save.current;save.highestStage=Math.max(save.highestStage||save.completed||0,save.current);save.completed=save.highestStage;save.totalClears=(save.totalClears||0)+1;save.companionClears[save.selected]++;if(!save.items.includes(save.current)&&ITEMS.some(x=>x.stage===save.current))save.items.push(save.current);save.unlocked=Math.max(save.unlocked,save.current+1);persist();renderBook();say('clear');let reward=ITEMS.find(x=>x.stage===lastStageCompleted),category=reward&&ITEM_CATEGORIES[reward.category];$('#resultCard').innerHTML=`<h2>STAGE CLEAR!</h2><p style="text-align:center">${c.name}「${c.lines.clear}」</p>${reward?`<div class="reward">${category.icon} ${reward.name} を手に入れた！</div>`:''}<div class="modal-actions"><button id="next" class="primary">次のステージへ</button><button id="resultHome" class="secondary">館へ戻る</button></div>`;$('#resultModal').classList.add('open');$('#next').onclick=()=>{$('#resultModal').classList.remove('open');save.current++;persist();startStage()};$('#resultHome').onclick=()=>{$('#resultModal').classList.remove('open');show('homeScreen');renderHome()};}
  function renderBook(){let owned=new Set(save.items);$('#itemsPage').innerHTML=`<div class="collection">${ITEMS.map(x=>{let ok=owned.has(x.stage),category=ITEM_CATEGORIES[x.category];return `<article class="collect ${ok?'':'locked'}"><span class="item-category">${ok?`${category.icon} ${category.name}`:'🔒 未入手'}</span><b>${ok?x.name:'？？？？？？'}</b><p>${ok?x.text:'館のどこかで、まだ見つかっていない品。'}</p><small>${ok?`STAGE ${x.stage} で入手`:'未入手'}</small></article>`}).join('')}</div>`;$('#achievementsPage').innerHTML=`<div class="achievements">${ACH.map(a=>{let ok=a.ok(save),category=ACH_CATEGORIES[a.category];return `<article class="achievement ${ok?'':'locked'}"><span class="ach-icon">${ok?category.icon:'🔒'}</span><div><span class="achievement-category">${category.name}</span><b>${ok?a.name:'？？？？？？'}</b><p>${a.text}</p></div></article>`}).join('')}</div>`;$('#recordsPage').innerHTML=`<div class="records"><article><span>最高到達ステージ</span><b>STAGE ${save.highestStage||save.completed||0}</b></article><article><span>通算クリア回数</span><b>${save.totalClears||save.completed||0} 回</b></article><article><span>収集品</span><b>${owned.size} / ${ITEMS.length}</b></article><article><span>バルトとクリア</span><b>${save.companionClears.balto} 回</b></article><article><span>フィロとクリア</span><b>${save.companionClears.philo} 回</b></article><article><span>ジュダとクリア</span><b>${save.companionClears.judah} 回</b></article></div>`;}
  $('#startBtn').onclick=startGame;$('#bookBtn').onclick=()=>{renderBook();show('bookScreen')};$('#settingsBtn').onclick=()=>{$('#settingsModal').classList.add('open')};$('#backHomeBtn').onclick=()=>{show('homeScreen');renderHome();persist()};$$('.backHome').forEach(b=>b.onclick=()=>{show('homeScreen');renderHome()});$('#restartBtn').onclick=()=>{if(confirm('このステージを最初からやり直しますか？'))startStage()};$$('.tab').forEach(t=>t.onclick=()=>{$$('.tab').forEach(x=>x.classList.toggle('active',x===t));$$('.book-page').forEach(x=>x.classList.remove('active'));$('#'+t.dataset.tab+'Page').classList.add('active')});$$('.closeModal').forEach(b=>b.onclick=()=>b.closest('.modal').classList.remove('open'));
  $('#exportBtn').onclick=async()=>{let text=btoa(unescape(encodeURIComponent(JSON.stringify(save))));$('#saveText').value=text;try{await navigator.clipboard.writeText(text);toast('セーブデータをコピーしたよ')}catch{toast('文字列をコピーして保管してね')}};
  $('#importBtn').onclick=()=>{try{let s=JSON.parse(decodeURIComponent(escape(atob($('#saveText').value.trim()))));if(!s.current)throw 0;if(confirm('現在のセーブデータを上書きしますか？')){save={...fresh(),...s,counts:{...fresh().counts,...s.counts},companionClears:{...fresh().companionClears,...s.companionClears}};persist();$('#settingsModal').classList.remove('open');renderHome();renderBook();toast('セーブデータを読み込んだよ')}}catch{toast('読み込めないデータです')}};
  $('#resetBtn').onclick=()=>{if(confirm('集めたアイテム・実績・進行状況をすべて初期化します。本当によろしいですか？')){save=fresh();persist();$('#settingsModal').classList.remove('open');renderHome();renderBook();toast('データを初期化したよ')}};
